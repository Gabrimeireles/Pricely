name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - homolog
      - phase/**
  push:
    branches:
      - homolog
      - phase/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check workflow permissions and trigger safety
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq '^permissions:$' .github/workflows/ci.yml
          grep -Eq '^  contents: read$' .github/workflows/ci.yml
          ! grep -R "pull_request_target:" .github/workflows
          ! grep -R "permissions: write-all" .github/workflows
          ! grep -R "contents: write" .github/workflows
      - name: Check dependency install integrity
        shell: bash
        run: |
          set -euo pipefail
          grep -q "npm ci" .github/workflows/ci.yml
          grep -q "flutter pub get" .github/workflows/ci.yml

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Build backend
        run: npm run build
      - name: Lint backend
        run: npm run lint
      - name: Test backend
        run: npm run test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Build web
        run: npm run build
      - name: Lint web
        run: npm run lint
      - name: Test web
        run: npm run test

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install mobile dependencies
        run: flutter pub get
      - name: Analyze mobile
        run: flutter analyze
      - name: Test mobile
        run: flutter test
      - name: Build debug APK
        if: github.event_name == 'workflow_dispatch'
        run: flutter build apk --debug
