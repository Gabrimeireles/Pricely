name: Deploy Homolog Server

on:
  workflow_dispatch:
    inputs:
      reset_database:
        description: "Drop/recreate schema before deploy. This is destructive."
        required: true
        type: boolean
        default: false
      run_seeders:
        description: "Run backend seeders after migration/reset."
        required: true
        type: boolean
        default: true
      health_url:
        description: "Optional public health URL to check after deploy."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-homolog-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    name: Build backend image
    uses: Gabrimeireles/reusable-workflows/.github/workflows/docker-build.yml@dd91057fc0ac8afcebbc7ae6ee1d1bdb65792e5a
    with:
      image_name: pricely-backend
      dockerfile: ./backend/Dockerfile
      context: ./backend

  build-web:
    name: Build web image
    uses: Gabrimeireles/reusable-workflows/.github/workflows/docker-build.yml@dd91057fc0ac8afcebbc7ae6ee1d1bdb65792e5a
    with:
      image_name: pricely-web
      dockerfile: ./web/Dockerfile
      context: ./web

  deploy:
    name: Deploy full stack
    runs-on: ubuntu-latest
    needs: [build-backend, build-web]
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE || secrets.RUNTIME_ENV_FILE }}
      WEB_ENV_FILE: ${{ secrets.WEB_ENV_FILE }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB || 'pricely' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5433' }}
      REDIS_PORT_PUBLIC: ${{ vars.REDIS_PORT_PUBLIC || '6380' }}
      PGADMIN_DEFAULT_EMAIL: ${{ vars.PGADMIN_DEFAULT_EMAIL || 'admin@pricely.example.com' }}
      PGADMIN_DEFAULT_PASSWORD: ${{ secrets.PGADMIN_DEFAULT_PASSWORD }}
      PGADMIN_PORT: ${{ vars.PGADMIN_PORT || '5050' }}
      BACKEND_PORT: ${{ vars.BACKEND_PORT || '3000' }}
      WEB_PORT: ${{ vars.WEB_PORT || '5173' }}
      WEB_APP_URL: ${{ vars.WEB_APP_URL || 'https://pricely.grmeireles.dev' }}
      HEALTH_URL: ${{ inputs.health_url || vars.WEB_APP_URL || 'https://pricely.grmeireles.dev' }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS || vars.WEB_APP_URL || 'https://pricely.grmeireles.dev' }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://apipricely.grmeireles.dev' }}
      VITE_ALLOWED_HOSTS: ${{ vars.VITE_ALLOWED_HOSTS || 'pricely.grmeireles.dev' }}
      VITE_ALLOW_ALL_HOSTS: ${{ vars.VITE_ALLOW_ALL_HOSTS || 'true' }}
      NODE_ENV: ${{ vars.NODE_ENV || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Resolve GHCR image names
        shell: bash
        run: |
          owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          short_sha="${GITHUB_SHA::7}"
          {
            printf 'BACKEND_IMAGE=ghcr.io/%s/pricely-backend\n' "$owner_lower"
            printf 'WEB_IMAGE=ghcr.io/%s/pricely-web\n' "$owner_lower"
            printf 'IMAGE_TAG=sha-%s\n' "$short_sha"
          } >> "$GITHUB_ENV"

      - name: Connect to Tailscale
        if: ${{ vars.USE_TAILSCALE == 'true' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dev-ci

      - name: Validate deploy inputs
        shell: bash
        run: |
          [ -n "$DEPLOY_HOST" ] || { echo "Missing secret DEPLOY_HOST"; exit 1; }
          [ -n "$DEPLOY_USER" ] || { echo "Missing secret DEPLOY_USER"; exit 1; }
          [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ] || { echo "Missing secret DEPLOY_SSH_KEY"; exit 1; }
          [ -n "$DEPLOY_PATH" ] || { echo "Missing variable DEPLOY_PATH"; exit 1; }
          [ -n "$BACKEND_ENV_FILE" ] || { echo "Missing secret BACKEND_ENV_FILE or legacy RUNTIME_ENV_FILE"; exit 1; }
          [ -n "$POSTGRES_PASSWORD" ] || { echo "Missing secret POSTGRES_PASSWORD"; exit 1; }
          [ -n "$PGADMIN_DEFAULT_PASSWORD" ] || { echo "Missing secret PGADMIN_DEFAULT_PASSWORD"; exit 1; }
          if [ -z "$GHCR_TOKEN" ] && [ -z "$GHCR_PAT" ]; then
            echo "Missing secret GHCR_TOKEN or GHCR_PAT"
            exit 1
          fi
          [ -f docker-compose.homolog.yml ] || { echo "Missing docker-compose.homolog.yml"; exit 1; }

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          for attempt in $(seq 1 6); do
            if ssh-keyscan -T 15 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            echo "ssh-keyscan failed on attempt $attempt; retrying..."
            sleep 5
          done
          echo "Unable to scan SSH host key for $DEPLOY_HOST"
          exit 1

      - name: Upload compose and env files
        shell: bash
        run: |
          mkdir -p .deploy
          cp docker-compose.homolog.yml .deploy/docker-compose.yml

          umask 177
          {
            printf 'BACKEND_IMAGE=%s\n' "$BACKEND_IMAGE"
            printf 'WEB_IMAGE=%s\n' "$WEB_IMAGE"
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB"
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_PORT=%s\n' "$POSTGRES_PORT"
            printf 'REDIS_PORT_PUBLIC=%s\n' "$REDIS_PORT_PUBLIC"
            printf 'PGADMIN_DEFAULT_EMAIL=%s\n' "$PGADMIN_DEFAULT_EMAIL"
            printf 'PGADMIN_DEFAULT_PASSWORD=%s\n' "$PGADMIN_DEFAULT_PASSWORD"
            printf 'PGADMIN_PORT=%s\n' "$PGADMIN_PORT"
            printf 'BACKEND_PORT=%s\n' "$BACKEND_PORT"
            printf 'WEB_PORT=%s\n' "$WEB_PORT"
            printf 'WEB_APP_URL=%s\n' "$WEB_APP_URL"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "$CORS_ALLOWED_ORIGINS"
            printf 'VITE_API_BASE_URL=%s\n' "$VITE_API_BASE_URL"
            printf 'VITE_ALLOWED_HOSTS=%s\n' "$VITE_ALLOWED_HOSTS"
            printf 'VITE_ALLOW_ALL_HOSTS=%s\n' "$VITE_ALLOW_ALL_HOSTS"
            printf 'NODE_ENV=%s\n' "$NODE_ENV"
          } > .deploy/.env

          printf '%s\n' "$BACKEND_ENV_FILE" > .deploy/.env.backend
          if [ -n "$WEB_ENV_FILE" ]; then
            printf '%s\n' "$WEB_ENV_FILE" > .deploy/.env.web
          else
            printf '# Optional web runtime env file intentionally left empty.\n' > .deploy/.env.web
          fi

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp .deploy/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp .deploy/.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          scp .deploy/.env.backend "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env.backend"
          scp .deploy/.env.web "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env.web"

      - name: Deploy containers
        shell: bash
        run: |
          GHCR_AUTH_TOKEN="$GHCR_TOKEN"
          if [ -z "$GHCR_AUTH_TOKEN" ]; then
            GHCR_AUTH_TOKEN="$GHCR_PAT"
          fi

          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "GHCR_AUTH_TOKEN='$GHCR_AUTH_TOKEN' GITHUB_REPOSITORY_OWNER='${{ github.repository_owner }}' BACKEND_IMAGE='$BACKEND_IMAGE' WEB_IMAGE='$WEB_IMAGE' IMAGE_TAG='$IMAGE_TAG' RESET_DATABASE='${{ inputs.reset_database || false }}' RUN_SEEDERS='${{ inputs.run_seeders || false }}' DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'ENDSSH'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          echo "$GHCR_AUTH_TOKEN" | docker login ghcr.io -u "$GITHUB_REPOSITORY_OWNER" --password-stdin

          # Pull directly so any auth or digest mismatch aborts the deploy.
          docker pull "${BACKEND_IMAGE}:${IMAGE_TAG}"
          docker pull "${WEB_IMAGE}:${IMAGE_TAG}"
          docker compose --env-file .env up -d postgres redis pgadmin

          echo "Waiting for PostgreSQL..."
          for attempt in $(seq 1 30); do
            if docker compose --env-file .env exec -T postgres sh -lc 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' </dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "PostgreSQL did not become ready"
              exit 1
            fi
            sleep 2
          done

          mkdir -p backups
          chmod 700 backups
          BACKUP_FILE="backups/pre-deploy-${IMAGE_TAG}-$(date -u +%Y%m%dT%H%M%SZ).dump"
          echo "Creating verified pre-deploy database backup at $BACKUP_FILE..."
          docker compose --env-file .env exec -T postgres sh -lc \
            'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB" --format=custom --no-owner' \
            > "$BACKUP_FILE"
          chmod 600 "$BACKUP_FILE"
          docker compose --env-file .env exec -T postgres sh -lc \
            'pg_restore --list' < "$BACKUP_FILE" >/dev/null
          find backups -type f -name 'pre-deploy-*.dump' -mtime +14 -delete

          if [ "$RESET_DATABASE" = "true" ]; then
            echo "Running destructive database reset..."
            docker compose --env-file .env run --rm -T backend sh -lc \
              "npm run db:generate && npm run db:migrate:reset" </dev/null
          else
            echo "Applying versioned database migrations..."
            docker compose --env-file .env run --rm -T backend sh -lc \
              "npm run db:generate && npm run db:migrate:deploy:safe" </dev/null
          fi

          if [ "$RUN_SEEDERS" = "true" ]; then
            echo "Running seeders..."
            docker compose --env-file .env run --rm -T backend sh -lc "npm run db:seed" </dev/null
          fi

          docker compose --env-file .env up -d --force-recreate backend web
          docker compose --env-file .env ps

          echo "Waiting for web production server..."
          for attempt in $(seq 1 30); do
            if docker compose --env-file .env exec -T web sh -lc \
              "test -f /usr/share/nginx/html/index.html && wget -qO- http://127.0.0.1:5173 >/dev/null" </dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Web production server did not become ready"
              docker compose --env-file .env logs --tail=120 web
              exit 1
            fi
            sleep 5
          done

          docker compose --env-file .env exec -T web sh -lc \
            "printenv | sort | grep -E '^(VITE_|NODE_ENV)'; sed -n '1,20p' /usr/share/nginx/html/index.html" </dev/null
          docker image prune -f
          ENDSSH

      - name: Health check
        shell: bash
        run: |
          for attempt in $(seq 1 20); do
            status=$(curl -sS -L --connect-timeout 5 --max-time 15 -o /tmp/health.body -w "%{http_code}" "$HEALTH_URL" || true)
            if echo "$status" | grep -q '^2[0-9][0-9]$'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed"
          cat /tmp/health.body || true
          exit 1
