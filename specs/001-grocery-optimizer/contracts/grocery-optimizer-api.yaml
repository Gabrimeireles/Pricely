openapi: 3.1.0
info:
  title: Grocery Optimizer API
  version: 0.2.0
  description: >
    Contract for shared authentication, public region and offer discovery, reusable
    shopping lists, backend-owned optimization runs, and restricted admin dashboard
    management workflows.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      security: []
      summary: Register a shared user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /auth/login:
    post:
      security: []
      summary: Authenticate a shared user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /auth/me:
    get:
      summary: Return the authenticated account profile
      responses:
        '200':
          description: Current account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccount'
  /locations:
    get:
      summary: List user-configured locations and coverage radius settings
      responses:
        '200':
          description: Location preferences returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserLocationPreference'
    post:
      summary: Save a user-configured location and coverage radius
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertLocationPreferenceRequest'
      responses:
        '201':
          description: Location preference saved with current coverage count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLocationPreference'
  /locations/coverage-preview:
    post:
      summary: Preview active establishment coverage for a candidate location/radius
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoveragePreviewRequest'
      responses:
        '200':
          description: Establishment coverage preview returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoveragePreview'
  /regions:
    get:
      security: []
      summary: List public regions visible in selectors
      responses:
        '200':
          description: Public region list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicRegion'
  /regions/{regionId}/offers:
    get:
      security: []
      summary: List active offers for a visible region
      parameters:
        - $ref: '#/components/parameters/RegionId'
      responses:
        '200':
          description: Regional offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOffer'
  /catalog-products/search:
    get:
      security: []
      summary: Search generic comparable products for shopper list entry
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Matching generic products returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogProduct'
  /catalog-products/{catalogProductId}/variants:
    get:
      security: []
      summary: List concrete branded variants for one generic product
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      responses:
        '200':
          description: Variants returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductVariant'
  /catalog-products/{catalogProductId}:
    get:
      security: []
      summary: Fetch a generic product detail view with variants and current offers
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      responses:
        '200':
          description: Product detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
  /catalog-products/{catalogProductId}/offers:
    get:
      security: []
      summary: Fetch active establishment prices for one generic product across variants
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      responses:
        '200':
          description: Product offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOffer'
  /shopping-lists:
    get:
      summary: List shopping lists for the authenticated user
      responses:
        '200':
          description: Shopping lists returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShoppingList'
    post:
      summary: Create a reusable shopping list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShoppingListRequest'
      responses:
        '201':
          description: Shopping list created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
  /shopping-lists/{shoppingListId}:
    patch:
      summary: Update shopping list metadata
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShoppingListRequest'
      responses:
        '200':
          description: Shopping list updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
  /shopping-lists/{shoppingListId}/share:
    post:
      summary: Publish a shopper-owned shopping list behind an opaque share token
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      responses:
        '200':
          description: Shopping list share link state returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
        '400':
          description: List has no items to share
        '404':
          description: Shopping list not found for authenticated owner
  /shopping-lists/shared/{shareToken}:
    get:
      security: []
      summary: Fetch a read-only shopping list through a public share token
      parameters:
        - $ref: '#/components/parameters/ShareToken'
      responses:
        '200':
          description: Shared shopping list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
        '404':
          description: Shared shopping list not found or no longer public
  /shopping-lists/{shoppingListId}/items:
    post:
      summary: Add items to a shopping list
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddShoppingListItemsRequest'
      responses:
        '200':
          description: Shopping list updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
  /shopping-lists/{shoppingListId}/optimization-runs:
    post:
      summary: Queue a new optimization run for a shopping list
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOptimizationRunRequest'
      responses:
        '202':
          description: Optimization queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRunAccepted'
  /shopping-lists/{shoppingListId}/optimization-runs/latest:
    get:
      summary: Fetch the latest optimization run for a shopping list
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      responses:
        '200':
          description: Latest optimization run returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRun'
        '404':
          description: No optimization run found
  /processing-jobs/{jobId}:
    get:
      summary: Fetch processing job state
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Processing job returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
  /missing-product-requests:
    get:
      summary: List the authenticated shopper missing-product requests
      responses:
        '200':
          description: Requests returned
    post:
      summary: Request catalog review for a product that was not found
      responses:
        '201':
          description: Missing-product request created
  /admin/processing-jobs/{jobId}/retry:
    post:
      summary: Requeue a failed or cancelled processing job
      responses:
        '201':
          description: Job requeued with persisted business payload
  /admin/processing-jobs/{jobId}/review:
    post:
      summary: Mark a processing job as operationally reviewed
      responses:
        '201':
          description: Review audit timestamp recorded
  /admin/processing-jobs/{jobId}/cancel:
    post:
      summary: Cancel a queued or retrying job before worker execution
      responses:
        '201':
          description: Job removed from the waiting queue and audit retained
  /admin/notification-deliveries:
    get:
      summary: List redacted notification delivery attempts for admin diagnostics
      parameters:
        - in: query
          name: channel
          schema:
            type: string
            enum: [email, push]
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, sending, retrying, delivered, failed, cancelled]
        - in: query
          name: notificationType
          schema:
            type: string
            enum:
              [
                price_drop,
                receipt_outcome,
                optimization_ready,
                optimization_failed,
              ]
        - in: query
          name: retryability
          schema:
            type: string
            enum: [retryable, not_retryable]
        - in: query
          name: destination
          schema:
            type: string
          description: Search against redacted email or push destination labels
        - in: query
          name: search
          schema:
            type: string
          description: Search attempt id, notification id, owner label, title, resource, or redacted error
      responses:
        '200':
          description: Notification delivery attempts returned newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminNotificationDelivery'
  /admin/notification-deliveries/{attemptId}/retry:
    post:
      summary: Requeue a failed or retrying notification delivery attempt
      responses:
        '201':
          description: Delivery attempt requeued when retry budget remains
  /admin/notification-deliveries/{attemptId}/cancel:
    post:
      summary: Cancel a queued or retrying notification delivery attempt
      responses:
        '201':
          description: Delivery attempt cancelled with audit reason
  /admin/missing-product-requests:
    get:
      summary: List shopper missing-product requests for catalog triage
      responses:
        '200':
          description: Requests returned
  /admin/missing-product-requests/{requestId}/convert:
    post:
      summary: Convert a shopper request into a catalog product
      responses:
        '201':
          description: Catalog product created and request linked
  /admin/missing-product-requests/{requestId}/reject:
    post:
      summary: Reject a missing-product request with audit context
      responses:
        '201':
          description: Request rejected
  /notifications:
    get:
      summary: List authenticated in-app notifications
      responses:
        '200':
          description: Notifications returned newest first
  /notifications/{notificationId}/read:
    patch:
      summary: Mark one owned notification as read
      responses:
        '200':
          description: Notification updated
  /notifications/read-all:
    post:
      summary: Mark all authenticated user notifications as read
      responses:
        '201':
          description: Unread notifications updated
  /notification-preferences:
    get:
      summary: Fetch notification channel and category preferences
      responses:
        '200':
          description: Preferences returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
    patch:
      summary: Update notification channel and category preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdate'
      responses:
        '200':
          description: Preferences updated; outbound channels can be deferred by quiet hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
  /notification-email-destination:
    get:
      summary: Fetch the authenticated user's email notification destination
      responses:
        '200':
          description: Email destination returned when configured
    post:
      summary: Request verification for an email notification destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailDestinationRequest'
      responses:
        '201':
          description: Verification request recorded; external email delivery remains provider-gated
  /notification-email-destination/confirm:
    post:
      summary: Confirm an email notification destination by verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenRequest'
      responses:
        '201':
          description: Destination verified and email notifications enabled
  /notification-email-unsubscribe:
    post:
      summary: Disable all email notifications or one mapped category by unsubscribe token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailUnsubscribeRequest'
      responses:
        '201':
          description: Email preference updated
  /notification-push-devices:
    get:
      summary: List authenticated mobile push devices
      responses:
        '200':
          description: Push devices returned newest active first
    post:
      summary: Register or refresh an authenticated mobile push device token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushDeviceRegistrationRequest'
      responses:
        '201':
          description: Push device registered or refreshed
  /notification-push-devices/{deviceId}/revoke:
    post:
      summary: Revoke an authenticated mobile push device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Push device revoked
  /receipts:
    post:
      summary: Submit a receipt contribution from manual items or an NFC-e QR URL
      responses:
        '202':
          description: Receipt accepted for manual release or processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptSubmission'
  /receipts/{receiptId}:
    get:
      summary: Fetch the authenticated shopper receipt processing and reward state
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Receipt state returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptSubmission'
        '404':
          description: Receipt does not exist or belongs to another account
  /admin/metrics/overview:
    get:
      summary: Return overview metrics for the admin dashboard
      responses:
        '200':
          description: Overview metrics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverview'
  /admin/metrics/public-search:
    get:
      summary: Return persisted public offer search latency and SLO metrics
      responses:
        '200':
          description: Sliding-window public search metrics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSearchMetrics'
  /admin/regions:
    get:
      summary: List all regions for admin management
      responses:
        '200':
          description: Regions returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminRegion'
    post:
      summary: Create a region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegionRequest'
      responses:
        '201':
          description: Region created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRegion'
  /admin/regions/{regionId}:
    patch:
      summary: Update region state and metadata
      parameters:
        - $ref: '#/components/parameters/RegionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRegionRequest'
      responses:
        '200':
          description: Region updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRegion'
  /admin/establishments:
    get:
      summary: List establishments for admin management
      responses:
        '200':
          description: Establishments returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Establishment'
    post:
      summary: Create an establishment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEstablishmentRequest'
      responses:
        '201':
          description: Establishment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Establishment'
  /admin/establishments/{establishmentId}:
    patch:
      summary: Update establishment state and metadata
      parameters:
        - $ref: '#/components/parameters/EstablishmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstablishmentRequest'
      responses:
        '200':
          description: Establishment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Establishment'
  /admin/catalog-products:
    get:
      summary: List generic comparable products for admin management
      responses:
        '200':
          description: Products returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogProduct'
    post:
      summary: Create a generic comparable product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogProduct'
  /admin/catalog-products/{catalogProductId}:
    patch:
      summary: Update generic comparable product metadata
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogProduct'
  /admin/product-variants:
    get:
      summary: List concrete branded product variants for admin management
      responses:
        '200':
          description: Variants returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductVariant'
    post:
      summary: Create a product variant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductVariantRequest'
      responses:
        '201':
          description: Variant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
  /admin/product-variants/{productVariantId}:
    patch:
      summary: Update a product variant
      parameters:
        - name: productVariantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductVariantRequest'
      responses:
        '200':
          description: Variant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
  /admin/offers:
    get:
      summary: List product offers for admin management
      responses:
        '200':
          description: Offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOffer'
    post:
      summary: Create a product offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductOfferRequest'
      responses:
        '201':
          description: Offer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOffer'
  /admin/offers/{offerId}:
    patch:
      summary: Update a product offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductOfferRequest'
      responses:
        '200':
          description: Offer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOffer'
  /admin/processing-jobs:
    get:
      summary: List processing jobs for admin diagnostics
      responses:
        '200':
          description: Processing jobs returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessingJob'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RegionId:
      name: regionId
      in: path
      required: true
      schema:
        type: string
    CatalogProductId:
      name: catalogProductId
      in: path
      required: true
      schema:
        type: string
    ShoppingListId:
      name: shoppingListId
      in: path
      required: true
      schema:
        type: string
    ShareToken:
      name: shareToken
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    EstablishmentId:
      name: establishmentId
      in: path
      required: true
      schema:
        type: string
    OfferId:
      name: offerId
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        displayName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    EmailDestinationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    NotificationPreferences:
      type: object
      required:
        [
          inAppEnabled,
          priceDropsEnabled,
          receiptOutcomesEnabled,
          optimizationReadyEnabled,
          emailEnabled,
          pushEnabled,
          quietHoursEnabled,
        ]
      properties:
        inAppEnabled:
          type: boolean
        priceDropsEnabled:
          type: boolean
        receiptOutcomesEnabled:
          type: boolean
        optimizationReadyEnabled:
          type: boolean
        emailEnabled:
          type: boolean
        pushEnabled:
          type: boolean
        quietHoursEnabled:
          type: boolean
        quietHoursStartMinute:
          type: integer
          minimum: 0
          maximum: 1439
          nullable: true
        quietHoursEndMinute:
          type: integer
          minimum: 0
          maximum: 1439
          nullable: true
        quietHoursTimezone:
          type: string
          nullable: true
    NotificationPreferencesUpdate:
      type: object
      properties:
        inAppEnabled:
          type: boolean
        priceDropsEnabled:
          type: boolean
        receiptOutcomesEnabled:
          type: boolean
        optimizationReadyEnabled:
          type: boolean
        emailEnabled:
          type: boolean
        pushEnabled:
          type: boolean
        quietHoursEnabled:
          type: boolean
        quietHoursStartMinute:
          type: integer
          minimum: 0
          maximum: 1439
        quietHoursEndMinute:
          type: integer
          minimum: 0
          maximum: 1439
        quietHoursTimezone:
          type: string
    EmailTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    EmailUnsubscribeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        category:
          type: string
          enum: [all, price_drop, receipt_outcome, optimization]
    EmailNotificationDestination:
      type: object
      required: [id, email, status]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [pending, verified, unsubscribed]
        verifiedAt:
          type: string
          format: date-time
        unsubscribedAt:
          type: string
          format: date-time
    PushDeviceRegistrationRequest:
      type: object
      required: [platform, deviceToken]
      properties:
        platform:
          type: string
          enum: [android, ios]
        deviceToken:
          type: string
        provider:
          type: string
          default: fcm
        appVersion:
          type: string
        locale:
          type: string
        timezone:
          type: string
    PushDevice:
      type: object
      required: [id, platform, provider, deviceTokenTail, isActive, lastSeenAt]
      properties:
        id:
          type: string
        platform:
