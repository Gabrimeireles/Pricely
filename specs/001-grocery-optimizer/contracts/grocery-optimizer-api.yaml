openapi: 3.1.0
info:
  title: Grocery Optimizer API
  version: 0.2.0
  description: >
    Contract for shared authentication, public region and offer discovery, reusable
    shopping lists, backend-owned optimization runs, and restricted admin dashboard
    management workflows.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      security: []
      summary: Register a shared user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /auth/login:
    post:
      security: []
      summary: Authenticate a shared user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /auth/me:
    get:
      summary: Return the authenticated account profile
      responses:
        '200':
          description: Current account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccount'
  /regions:
    get:
      security: []
      summary: List public regions visible in selectors
      responses:
        '200':
          description: Public region list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicRegion'
  /regions/{regionId}/offers:
    get:
      security: []
      summary: List active offers for a visible region
      parameters:
        - $ref: '#/components/parameters/RegionId'
      responses:
        '200':
          description: Regional offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOffer'
  /catalog-products/search:
    get:
      security: []
      summary: Search generic comparable products for shopper list entry
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Matching generic products returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogProduct'
  /catalog-products/{catalogProductId}/variants:
    get:
      security: []
      summary: List concrete branded variants for one generic product
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      responses:
        '200':
          description: Variants returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductVariant'
  /catalog-products/{catalogProductId}:
    get:
      security: []
      summary: Fetch a generic product detail view with variants and current offers
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      responses:
        '200':
          description: Product detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
  /catalog-products/{catalogProductId}/offers:
    get:
      security: []
      summary: Fetch active establishment prices for one generic product across variants
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      responses:
        '200':
          description: Product offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOffer'
  /shopping-lists:
    get:
      summary: List shopping lists for the authenticated user
      responses:
        '200':
          description: Shopping lists returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShoppingList'
    post:
      summary: Create a reusable shopping list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShoppingListRequest'
      responses:
        '201':
          description: Shopping list created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
  /shopping-lists/{shoppingListId}:
    patch:
      summary: Update shopping list metadata
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShoppingListRequest'
      responses:
        '200':
          description: Shopping list updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
  /shopping-lists/{shoppingListId}/items:
    post:
      summary: Add items to a shopping list
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddShoppingListItemsRequest'
      responses:
        '200':
          description: Shopping list updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
  /shopping-lists/{shoppingListId}/optimization-runs:
    post:
      summary: Queue a new optimization run for a shopping list
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOptimizationRunRequest'
      responses:
        '202':
          description: Optimization queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRunAccepted'
  /shopping-lists/{shoppingListId}/optimization-runs/latest:
    get:
      summary: Fetch the latest optimization run for a shopping list
      parameters:
        - $ref: '#/components/parameters/ShoppingListId'
      responses:
        '200':
          description: Latest optimization run returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRun'
        '404':
          description: No optimization run found
  /processing-jobs/{jobId}:
    get:
      summary: Fetch processing job state
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Processing job returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
  /admin/metrics/overview:
    get:
      summary: Return overview metrics for the admin dashboard
      responses:
        '200':
          description: Overview metrics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverview'
  /admin/regions:
    get:
      summary: List all regions for admin management
      responses:
        '200':
          description: Regions returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminRegion'
    post:
      summary: Create a region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegionRequest'
      responses:
        '201':
          description: Region created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRegion'
  /admin/regions/{regionId}:
    patch:
      summary: Update region state and metadata
      parameters:
        - $ref: '#/components/parameters/RegionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRegionRequest'
      responses:
        '200':
          description: Region updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRegion'
  /admin/establishments:
    get:
      summary: List establishments for admin management
      responses:
        '200':
          description: Establishments returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Establishment'
    post:
      summary: Create an establishment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEstablishmentRequest'
      responses:
        '201':
          description: Establishment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Establishment'
  /admin/establishments/{establishmentId}:
    patch:
      summary: Update establishment state and metadata
      parameters:
        - $ref: '#/components/parameters/EstablishmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstablishmentRequest'
      responses:
        '200':
          description: Establishment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Establishment'
  /admin/catalog-products:
    get:
      summary: List generic comparable products for admin management
      responses:
        '200':
          description: Products returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogProduct'
    post:
      summary: Create a generic comparable product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogProduct'
  /admin/catalog-products/{catalogProductId}:
    patch:
      summary: Update generic comparable product metadata
      parameters:
        - $ref: '#/components/parameters/CatalogProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogProduct'
  /admin/product-variants:
    get:
      summary: List concrete branded product variants for admin management
      responses:
        '200':
          description: Variants returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductVariant'
    post:
      summary: Create a product variant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductVariantRequest'
      responses:
        '201':
          description: Variant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
  /admin/product-variants/{productVariantId}:
    patch:
      summary: Update a product variant
      parameters:
        - name: productVariantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductVariantRequest'
      responses:
        '200':
          description: Variant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
  /admin/offers:
    get:
      summary: List product offers for admin management
      responses:
        '200':
          description: Offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOffer'
    post:
      summary: Create a product offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductOfferRequest'
      responses:
        '201':
          description: Offer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOffer'
  /admin/offers/{offerId}:
    patch:
      summary: Update a product offer
      parameters:
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductOfferRequest'
      responses:
        '200':
          description: Offer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOffer'
  /admin/processing-jobs:
    get:
      summary: List processing jobs for admin diagnostics
      responses:
        '200':
          description: Processing jobs returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessingJob'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RegionId:
      name: regionId
      in: path
      required: true
      schema:
        type: string
    CatalogProductId:
      name: catalogProductId
      in: path
      required: true
      schema:
        type: string
    ShoppingListId:
      name: shoppingListId
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    EstablishmentId:
      name: establishmentId
      in: path
      required: true
      schema:
        type: string
    OfferId:
      name: offerId
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        displayName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthSession:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/UserAccount'
    UserAccount:
      type: object
      required: [id, email, displayName, role, status]
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [customer, admin]
        status:
          type: string
          enum: [active, suspended]
    PublicRegion:
      type: object
      required: [id, slug, name, stateCode, implantationStatus, activeEstablishmentCount]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        stateCode:
          type: string
        implantationStatus:
          type: string
          enum: [active, activating]
        activeEstablishmentCount:
          type: integer
    AdminRegion:
      allOf:
        - $ref: '#/components/schemas/PublicRegion'
        - type: object
          properties:
            implantationStatus:
              type: string
              enum: [active, activating, inactive]
    Establishment:
      type: object
      required: [id, brandName, unitName, cnpj, cityName, neighborhood, regionId, isActive]
      properties:
        id:
          type: string
        brandName:
          type: string
        unitName:
          type: string
        cnpj:
          type: string
        cityName:
          type: string
        neighborhood:
          type: string
        regionId:
          type: string
        isActive:
          type: boolean
    CatalogProduct:
      type: object
      required: [id, name, slug, category, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        defaultUnit:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
    ProductVariant:
      type: object
      required: [id, catalogProductId, displayName, isActive]
      properties:
        id:
          type: string
        catalogProductId:
          type: string
        slug:
          type: string
        displayName:
          type: string
        brandName:
          type: string
        variantLabel:
          type: string
        packageLabel:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
    ProductOffer:
      type: object
      required:
        [id, catalogProductId, productVariantId, establishmentId, displayName, packageLabel, priceAmount, availabilityStatus, confidenceLevel, observedAt, isActive]
      properties:
        id:
          type: string
        catalogProductId:
          type: string
        productVariantId:
          type: string
        establishmentId:
          type: string
        establishment:
          $ref: '#/components/schemas/Establishment'
        catalogProduct:
          $ref: '#/components/schemas/CatalogProduct'
        productVariant:
          $ref: '#/components/schemas/ProductVariant'
        displayName:
          type: string
        packageLabel:
          type: string
        priceAmount:
          type: number
        availabilityStatus:
          type: string
          enum: [available, unavailable, uncertain]
        confidenceLevel:
          type: string
          enum: [high, medium, low]
        sourceType:
          type: string
          enum: [admin, receipt, flyer, site]
        sourceReference:
          type: string
        observedAt:
          type: string
          format: date-time
        isActive:
          type: boolean
    ProductDetail:
      type: object
      required: [catalogProduct, variants, offers]
      properties:
        catalogProduct:
          $ref: '#/components/schemas/CatalogProduct'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'
        offers:
          type: array
          items:
            $ref: '#/components/schemas/ProductOffer'
    CreateShoppingListRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        preferredRegionId:
          type: string
    UpdateShoppingListRequest:
      type: object
      properties:
        name:
          type: string
        preferredRegionId:
          type: string
        status:
          type: string
          enum: [draft, ready, archived]
    AddShoppingListItemsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShoppingListItemInput'
    ShoppingListItemInput:
      type: object
      required: [requestedName]
      properties:
        requestedName:
          type: string
        catalogProductId:
          type: string
        lockedProductVariantId:
          type: string
        brandPreferenceMode:
          type: string
          enum: [any, preferred, exact]
        preferredBrandNames:
          type: array
          items:
            type: string
        quantity:
          type: number
        unitLabel:
          type: string
        notes:
          type: string
    ShoppingListItem:
      allOf:
        - $ref: '#/components/schemas/ShoppingListItemInput'
        - type: object
          required: [id, resolutionStatus, purchaseStatus]
          properties:
            id:
              type: string
            resolutionStatus:
              type: string
              enum: [unresolved, matched, partial, missing]
            purchaseStatus:
              type: string
              enum: [pending, purchased]
            purchasedAt:
              type: string
              format: date-time
    ShoppingList:
      type: object
      required: [id, name, status, items]
      properties:
        id:
          type: string
        name:
          type: string
        preferredRegionId:
          type: string
        status:
          type: string
          enum: [draft, ready, archived]
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShoppingListItem'
    CreateOptimizationRunRequest:
      type: object
      required: [mode, regionId]
      properties:
        mode:
          type: string
          enum: [local, global_unique, global_full]
        regionId:
          type: string
        preferredEstablishmentId:
          type: string
    OptimizationRunAccepted:
      type: object
      required: [optimizationRunId, jobId, status]
      properties:
        optimizationRunId:
          type: string
        jobId:
          type: string
        status:
          type: string
          enum: [queued]
    OptimizationSelection:
      type: object
      required: [shoppingListItemId, status]
      properties:
        shoppingListItemId:
          type: string
        productOfferId:
          type: string
        status:
          type: string
          enum: [selected, review, missing]
        estimatedCost:
          type: number
        confidenceNotice:
          type: string
    OptimizationRun:
      type: object
      required: [id, shoppingListId, mode, regionId, status, createdAt, selections]
      properties:
        id:
          type: string
        shoppingListId:
          type: string
        mode:
          type: string
          enum: [local, global_unique, global_full]
        regionId:
          type: string
        preferredEstablishmentId:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        totalEstimatedCost:
          type: number
        estimatedSavings:
          type: number
        coverageStatus:
          type: string
          enum: [complete, partial, none]
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        selections:
          type: array
          items:
            $ref: '#/components/schemas/OptimizationSelection'
    ProcessingJob:
      type: object
      required: [id, queueName, jobType, status, attemptCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        queueName:
          type: string
        jobType:
          type: string
          enum: [optimization, receipt_processing]
        status:
          type: string
          enum: [queued, running, completed, failed, retrying]
        attemptCount:
          type: integer
        failureReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    AdminOverview:
      type: object
      required: [activeUsers, optimizationRunsToday, queuedJobs, failedJobs, activeRegions, activeOffers]
      properties:
        activeUsers:
          type: integer
        optimizationRunsToday:
          type: integer
        queuedJobs:
          type: integer
        failedJobs:
          type: integer
        activeRegions:
          type: integer
        activeOffers:
          type: integer
    CreateRegionRequest:
      type: object
      required: [name, stateCode, implantationStatus]
      properties:
        name:
          type: string
        stateCode:
          type: string
        implantationStatus:
          type: string
          enum: [active, activating, inactive]
    UpdateRegionRequest:
      type: object
      properties:
        name:
          type: string
        stateCode:
          type: string
        implantationStatus:
          type: string
          enum: [active, activating, inactive]
    CreateEstablishmentRequest:
      type: object
      required: [brandName, unitName, cnpj, cityName, neighborhood, regionId]
      properties:
        brandName:
          type: string
        unitName:
          type: string
        cnpj:
          type: string
        cityName:
          type: string
        neighborhood:
          type: string
        regionId:
          type: string
        isActive:
          type: boolean
    UpdateEstablishmentRequest:
      type: object
      properties:
        brandName:
          type: string
        unitName:
          type: string
        neighborhood:
          type: string
        isActive:
          type: boolean
    CreateProductRequest:
      type: object
      required: [name, slug, category]
      properties:
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        defaultUnit:
          type: string
        imageUrl:
          type: string
    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        defaultUnit:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
    CreateProductVariantRequest:
      type: object
      required: [catalogProductId, displayName]
      properties:
        catalogProductId:
          type: string
        slug:
          type: string
        displayName:
          type: string
        brandName:
          type: string
        variantLabel:
          type: string
        packageLabel:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
    UpdateProductVariantRequest:
      type: object
      properties:
        displayName:
          type: string
        brandName:
          type: string
        variantLabel:
          type: string
        packageLabel:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
    CreateProductOfferRequest:
      type: object
      required: [catalogProductId, productVariantId, establishmentId, displayName, packageLabel, priceAmount, availabilityStatus, confidenceLevel, observedAt]
      properties:
        catalogProductId:
          type: string
        productVariantId:
          type: string
        establishmentId:
          type: string
        displayName:
          type: string
        packageLabel:
          type: string
        priceAmount:
          type: number
        availabilityStatus:
          type: string
          enum: [available, unavailable, uncertain]
        confidenceLevel:
          type: string
          enum: [high, medium, low]
        sourceType:
          type: string
          enum: [admin, receipt, flyer, site]
        sourceReference:
          type: string
        observedAt:
          type: string
          format: date-time
        isActive:
          type: boolean
    UpdateProductOfferRequest:
      type: object
      properties:
        catalogProductId:
          type: string
        productVariantId:
          type: string
        establishmentId:
          type: string
        displayName:
          type: string
        packageLabel:
          type: string
